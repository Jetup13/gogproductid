<!DOCTYPE html>
<html>
<head>
<title>GOG Frontend File Generator</title>
<meta charset="UTF-8">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<style>
  :root {
    --bg: #0d0f14;
    --bg-secondary: #141720;
    --bg-panel: #111318;
    --text: #c8d4e8;
    --text-dim: #6a7a90;
    --accent: #b06aff;
    --accent2: #6ab4ff;
    --gog-purple: #9b4dca;
    --border: #2a2f3d;
    --border-glow: #3a2a5a;
    --input-bg: #181c26;
    --result-hover: #1a1e2a;
    --green: #4caf7d;
    --red: #ff5555;
    --orange: #ff9800;
    --scrollbar: #2a2f3d;
    --scrollbar-thumb: #4a3f6a;
  }

  @media (prefers-color-scheme: light) {
    :root {
      --bg: #f4f6fb;
      --bg-secondary: #eaedf5;
      --bg-panel: #ffffff;
      --text: #1a1c24;
      --text-dim: #6a7a90;
      --accent: #7c3aed;
      --accent2: #2563eb;
      --gog-purple: #7c3aed;
      --border: #d0d5e2;
      --border-glow: #c4b5fd;
      --input-bg: #ffffff;
      --result-hover: #eef0fa;
      --green: #16a34a;
      --red: #dc2626;
      --orange: #d97706;
      --scrollbar: #e2e5f0;
      --scrollbar-thumb: #b0b8d0;
    }
  }

  * { box-sizing: border-box; }

  body {
    font-family: Arial;
    margin: 0;
    padding: 24px;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse at 20% 20%, rgba(155, 77, 202, 0.07) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 80%, rgba(106, 180, 255, 0.05) 0%, transparent 50%);
  }

  h1 {
    font-family: Arial;
    font-size: 22px;
    text-transform: uppercase;
    margin: 0 0 4px 0;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .subtitle {
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 20px;
  }

  .header-bar {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }

  .gog-badge {
    background: linear-gradient(135deg, var(--gog-purple), #6a2fa0);
    color: white;
    font-family: Arial;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 2px;
    padding: 4px 10px;
    border-radius: 3px;
    text-transform: uppercase;
  }

  #status {
    font-size: 12px;
    padding: 8px 14px;
    border-radius: 4px;
    border-left: 3px solid var(--text-dim);
    background: var(--bg-secondary);
    color: var(--text-dim);
    margin-bottom: 16px;
    transition: all 0.3s ease;
  }
  #status.ok { border-color: var(--green); color: var(--green); }
  #status.err { border-color: var(--red); color: var(--red); }
  #status.loading { border-color: var(--accent2); color: var(--accent2); }

  .top-controls {
    display: flex;
    gap: 10px;
    align-items: center;
    margin-bottom: 18px;
    flex-wrap: wrap;
  }

  button {
    font-family: Arial;
    padding: 8px 16px;
    border-radius: 4px;
    border: 1px solid var(--border);
    background: var(--input-bg);
    color: var(--text);
    letter-spacing: 1px;
    transition: all 0.15s ease;
  }
  button:hover { border-color: var(--accent); color: var(--accent); }
  button:disabled { opacity: 0.35; cursor: not-allowed; }
  button:disabled:hover { border-color: var(--border); color: var(--text); }

  .search-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 16px;
  }

  @media (max-width: 700px) {
    .search-grid { grid-template-columns: 1fr; }
  }

  .search-panel {
    background: var(--bg-panel);
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
  }

  .search-panel-header {
    padding: 10px 14px;
    background: var(--bg-secondary);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .search-panel-header .label {
    font-family: Arial;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .label-game { color: var(--accent); }
  .label-pack { color: var(--accent2); }

  .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .dot-game { background: var(--accent); box-shadow: 0 0 6px var(--accent); }
  .dot-pack { background: var(--accent2); box-shadow: 0 0 6px var(--accent2); }

  .search-panel input[type="text"] {
    width: 100%;
    padding: 10px 14px;
    font-family: Arial;
    font-size: 13px;
    background: var(--input-bg);
    color: var(--text);
    border: none;
    border-bottom: 1px solid var(--border);
    outline: none;
    transition: background 0.2s;
  }
  .search-panel input[type="text"]:focus { background: var(--result-hover); }
  .search-panel input[type="text"]::placeholder { color: var(--text-dim); }

  .results-box {
    max-height: 260px;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--scrollbar-thumb) var(--scrollbar);
  }
  .results-box::-webkit-scrollbar { width: 5px; }
  .results-box::-webkit-scrollbar-track { background: var(--scrollbar); }
  .results-box::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); border-radius: 3px; }

  .result {
    padding: 7px 14px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 12px;
    transition: background 0.1s;
  }
  .result:hover { background: var(--result-hover); }
  .result-id { color: var(--text-dim); font-size: 11px; margin-left: 6px; }

  .add-btn {
    background: transparent;
    color: var(--green);
    border: 1px solid var(--green);
    padding: 3px 10px;
    font-size: 11px;
    letter-spacing: 1px;
  }
  .add-btn:hover { background: rgba(76, 175, 125, 0.12); border-color: var(--green); color: var(--green); }

  .selected-section {
    background: var(--bg-panel);
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
    margin-bottom: 18px;
  }

  .selected-header {
    padding: 10px 14px;
    background: var(--bg-secondary);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .selected-header .label {
    font-family: Arial;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text);
  }

  .selected-header .count-badge {
    background: var(--gog-purple);
    color: white;
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 10px;
  }

  .selected-list {
    max-height: 200px;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--scrollbar-thumb) var(--scrollbar);
  }
  .selected-list::-webkit-scrollbar { width: 5px; }
  .selected-list::-webkit-scrollbar-track { background: var(--scrollbar); }
  .selected-list::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); border-radius: 3px; }

  .selected-item {
    padding: 7px 14px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 12px;
  }

  .selected-item .type-tag {
    font-size: 10px;
    padding: 1px 6px;
    border-radius: 3px;
    margin-right: 8px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .type-tag-game { background: rgba(176, 106, 255, 0.15); color: var(--accent); border: 1px solid rgba(176, 106, 255, 0.3); }
  .type-tag-pack { background: rgba(106, 180, 255, 0.12); color: var(--accent2); border: 1px solid rgba(106, 180, 255, 0.25); }

  .remove-btn {
    background: transparent;
    color: var(--red);
    border: 1px solid rgba(255, 85, 85, 0.4);
    padding: 3px 10px;
    font-size: 11px;
  }
  .remove-btn:hover { background: rgba(255, 85, 85, 0.12); border-color: var(--red); color: var(--red); }

  .clear-btn {
    background: transparent;
    color: var(--orange);
    border: 1px solid rgba(255, 152, 0, 0.4);
    font-size: 12px;
    padding: 5px 14px;
  }
  .clear-btn:hover { background: rgba(255, 152, 0, 0.1); border-color: var(--orange); color: var(--orange); }

  .controls-bar {
    display: flex;
    gap: 20px;
    align-items: center;
    flex-wrap: wrap;
    padding: 14px 16px;
    background: var(--bg-panel);
    border: 1px solid var(--border);
    border-radius: 6px;
    margin-bottom: 16px;
  }

  .controls-group {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .controls-group label {
    font-size: 12px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    color: var(--text);
  }

  .controls-label {
    font-family: Arial;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-dim);
    white-space: nowrap;
  }

  input[type="radio"], input[type="checkbox"] {
    accent-color: var(--accent);
    width: 14px; height: 14px;
  }

  .divider { width: 1px; height: 28px; background: var(--border); flex-shrink: 0; }

  .gen-btn {
    font-family: Arial;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    padding: 10px 24px;
    background: linear-gradient(135deg, rgba(155, 77, 202, 0.2), rgba(106, 180, 255, 0.1));
    border: 1px solid var(--gog-purple);
    color: var(--accent);
    text-transform: uppercase;
    transition: all 0.2s ease;
  }
  .gen-btn:hover:not(:disabled) {
    background: linear-gradient(135deg, rgba(155, 77, 202, 0.35), rgba(106, 180, 255, 0.2));
    border-color: var(--accent);
    box-shadow: 0 0 16px rgba(176, 106, 255, 0.25);
    color: white;
  }

  .empty-msg {
    padding: 20px;
    text-align: center;
    color: var(--text-dim);
    font-size: 12px;
  }
</style>
</head>

<body>

<h1>GOG File Generator</h1>
<div class="subtitle">Frontend File Generator &mdash; ES-DE / Daijishou</div>

<div class="top-controls">
  <button onclick="loadJSON()">Load Local JSON</button>
  <input type="file" id="jsonFile" style="display:none" accept=".json">
  <div class="gog-badge">GOG</div>
</div>

<div id="status" class="loading">Loading GOG catalog from GitHub...</div>

<div class="search-grid">
  <!-- Games panel -->
  <div class="search-panel">
    <div class="search-panel-header">
      <div class="dot dot-game"></div>
      <span class="label label-game">Games</span>
    </div>
    <input type="text" id="searchGame" placeholder="Search games..." oninput="search('game')" disabled>
    <div class="results-box" id="resultsGame"></div>
  </div>

  <!-- Packs panel -->
  <div class="search-panel">
    <div class="search-panel-header">
      <div class="dot dot-pack"></div>
      <span class="label label-pack">Packs</span>
    </div>
    <input type="text" id="searchPack" placeholder="Search packs..." oninput="search('pack')" disabled>
    <div class="results-box" id="resultsPack"></div>
  </div>
</div>

<!-- Selected -->
<div class="selected-section">
  <div class="selected-header">
    <span class="label">Selected Items</span>
    <div style="display:flex;align-items:center;gap:10px;">
      <span class="count-badge" id="selectedCount">0</span>
      <button class="clear-btn" onclick="clearSelected()">Clear All</button>
    </div>
  </div>
  <div class="selected-list" id="selected">
    <div class="empty-msg">No items selected yet.</div>
  </div>
</div>

<!-- Controls -->
<div class="controls-bar">
  <span class="controls-label">Platform</span>
  <div class="controls-group">
    <label><input type="radio" name="fileType" value="esde" checked> ES-DE</label>
    <label><input type="radio" name="fileType" value="daijishou"> Daijishou</label>
  </div>
  <div class="divider"></div>
  <div class="controls-group">
    <label>
      <input type="checkbox" id="downloadCovers">
      Download covers
    </label>
  </div>
  <div class="divider"></div>
  <button class="gen-btn" onclick="generateZip()" id="genZip" disabled>Generate ZIP</button>
</div>

<script>
let storeData = [];
let selectedGames = [];

window.addEventListener('DOMContentLoaded', async function() {
  const url = 'https://raw.githubusercontent.com/Jetup13/gogproductid/main/gog.json';
  const statusDiv = document.getElementById("status");

  try {
    statusDiv.innerText = "Loading GOG catalog from GitHub...";
    statusDiv.className = "loading";

    const response = await fetch(url);
    if (!response.ok) throw new Error('Fetch failed');

    storeData = await response.json();
    statusDiv.innerText = "✓ Loaded " + storeData.length + " GOG products.";
    statusDiv.className = "ok";
    document.getElementById("searchGame").disabled = false;
    document.getElementById("searchPack").disabled = false;
  } catch (err) {
    statusDiv.innerText = "✗ Could not load from GitHub. Use 'Load Local JSON' instead.";
    statusDiv.className = "err";
  }
});

function loadJSON() {
  document.getElementById("jsonFile").click();
}

document.getElementById("jsonFile").addEventListener("change", function() {
  const file = this.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      storeData = JSON.parse(e.target.result);
      const statusDiv = document.getElementById("status");
      statusDiv.innerText = "✓ Loaded " + storeData.length + " GOG products from local file.";
      statusDiv.className = "ok";
      document.getElementById("searchGame").disabled = false;
      document.getElementById("searchPack").disabled = false;
    } catch {
      const statusDiv = document.getElementById("status");
      statusDiv.innerText = "✗ Error reading JSON file.";
      statusDiv.className = "err";
    }
  };
  reader.readAsText(file);
});

function search(type) {
  const inputId = type === 'game' ? 'searchGame' : 'searchPack';
  const resultsId = type === 'game' ? 'resultsGame' : 'resultsPack';
  const q = document.getElementById(inputId).value.toLowerCase();
  const resultsDiv = document.getElementById(resultsId);
  resultsDiv.innerHTML = "";

  if (q.length < 2) return;

  const filtered = storeData
    .filter(g => g.product_type === type && g.title.toLowerCase().includes(q))
    .slice(0, 300);

  if (filtered.length === 0) {
    resultsDiv.innerHTML = '<div class="empty-msg">No results found.</div>';
    return;
  }

  filtered.forEach(item => {
    const div = document.createElement("div");
    div.className = "result";

    const left = document.createElement("span");
    left.innerHTML = `${item.title}<span class="result-id">#${item.product_id}</span>`;

    const btn = document.createElement("button");
    btn.className = "add-btn";
    btn.innerText = "+ Add";
    btn.onclick = e => { e.stopPropagation(); addItem(item); };

    div.appendChild(left);
    div.appendChild(btn);
    div.onclick = () => addItem(item);
    resultsDiv.appendChild(div);
  });
}

function addItem(item) {
  if (selectedGames.find(g => g.product_id === item.product_id)) return;
  selectedGames.push(item);
  updateSelectedDisplay();
}

function removeItem(product_id) {
  selectedGames = selectedGames.filter(g => g.product_id !== product_id);
  updateSelectedDisplay();
}

function clearSelected() {
  if (selectedGames.length && confirm(`Clear all ${selectedGames.length} selected items?`)) {
    selectedGames = [];
    updateSelectedDisplay();
  }
}

function updateSelectedDisplay() {
  const selectedDiv = document.getElementById("selected");
  const countSpan = document.getElementById("selectedCount");
  const genZipBtn = document.getElementById("genZip");

  countSpan.innerText = selectedGames.length;
  genZipBtn.disabled = selectedGames.length === 0;

  if (selectedGames.length === 0) {
    selectedDiv.innerHTML = '<div class="empty-msg">No items selected yet.</div>';
    return;
  }

  selectedDiv.innerHTML = "";
  selectedGames.forEach(item => {
    const div = document.createElement("div");
    div.className = "selected-item";

    const left = document.createElement("span");
    left.style.display = "flex";
    left.style.alignItems = "center";
    left.innerHTML = `<span class="type-tag type-tag-${item.product_type}">${item.product_type}</span>${item.title} <span class="result-id">#${item.product_id}</span>`;

    const btn = document.createElement("button");
    btn.className = "remove-btn";
    btn.innerText = "Remove";
    btn.onclick = () => removeItem(item.product_id);

    div.appendChild(left);
    div.appendChild(btn);
    selectedDiv.appendChild(div);
  });
}

function sanitize(name) {
  return name.replace(/:/g, " -").replace(/[\\/*?"<>|]/g, "").replace(/\s+/g, " ").trim();
}

async function generateZip() {
  const fileType = document.querySelector('input[name="fileType"]:checked').value;
  const downloadCovers = document.getElementById("downloadCovers").checked;
  const zip = new JSZip();
  const covers = downloadCovers ? zip.folder("covers") : null;

  for (const item of selectedGames) {
    const name = sanitize(item.title);

    let content;
    if (fileType === "esde") {
      content = item.product_id.toString();
    } else {
      // Daijishou
      content = `# Daijishou Player Template\n[gog] ${item.product_id}\n...`;
    }

    zip.file(name + ".gog", content);

    if (downloadCovers && item.image_logo) {
      try {
        const imgUrl = `https://images.gog-statics.com/${item.image_logo}_product_tile_extended_432x243_2x.jpg`;
        const r = await fetch(imgUrl);
        if (r.ok) covers.file(name + ".jpg", await r.blob());
      } catch {}
    }
  }

  const blob = await zip.generateAsync({ type: "blob" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  const zipName = fileType === "esde" ? "gog_es-de" : "gog_daijishou";
  a.download = `${zipName}.zip`;
  a.click();
  URL.revokeObjectURL(a.href);
}
</script>
</body>
</html>
